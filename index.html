<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página de Prueba</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4e73df, #1cc88a);
    color:white;
    text-align:center;
}

.container{
    padding:80px 20px;
}

h1{
    font-size:48px;
    margin-bottom:10px;
}

p{
    font-size:20px;
    margin-bottom:30px;
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    background:white;
    color:#4e73df;
    transition:0.3s;
}

button:hover{
    background:#f8f9fc;
    transform:scale(1.05);
}

.footer{
    position:fixed;
    bottom:10px;
    width:100%;
    font-size:14px;
}
</style>

</head>
<body>

<div class="container">
    <h1>🚀 Mi Página de Prueba</h1>
    <p>Estoy aprendiendo a subir páginas a internet</p>
    <button onclick="saludar()">Haz clic aquí</button>
</div>

<div class="footer">
    © 2026 - Página creada en GitHub Pages
</div>

<script>
function saludar(){
    alert("¡Funciona perfectamente! 🎉");
}
</script>

</body>
</html>
