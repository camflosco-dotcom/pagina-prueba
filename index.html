<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Página Pro</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f6f9;
}

header{
    background:#111;
    color:white;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    margin:0 15px;
    text-decoration:none;
}

.hero{
    text-align:center;
    padding:60px 20px;
    background:linear-gradient(135deg,#4e73df,#1cc88a);
    color:white;
}

.hero img{
    width:150px;
    border-radius:50%;
    margin-top:20px;
}

.section{
    padding:50px 20px;
    text-align:center;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#4e73df;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#2e59d9;
}
footer{
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
}
</style>

</head>
<body>

<header>
    <h2>Mi Sitio Web</h2>
    <nav>
        <a href="#">Inicio</a>
        <a href="#">Sobre mí</a>
        <a href="#">Contacto</a>
    </nav>
</header>

<div class="hero">
    <h1>Hola, soy aksel 🚀</h1>
    <p>Estoy aprendiendo desarrollo web</p>
    <img src="https://via.placeholder.com/150" alt="Foto">
</div>

<div class="section">
    <h2>Sobre mí</h2>
    <p>Esta es una página de prueba creada con GitHub Pages.</p>
    <button onclick="mensaje()">Haz clic</button>
</div>

<footer>
    © 2026 Mi Primera Página Profesional
</footer>

<script>
function mensaje(){
    alert("¡Tu página ya es profesional! 😎🔥");
}
</script>

</body>
</html>
